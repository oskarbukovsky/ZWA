<!DOCTYPE html>
<html lang="cs">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" type="text/css" href="css/login.css">
    <link rel="prefetch" href="desktop.html">
    <link href="https://fonts.cdnfonts.com/css/segoe-ui-variable-static-display" rel="stylesheet">
    <link rel="icon" href="media/favicon.png" type="image/gif" sizes="256x256">
    <title>Login</title>
    <script src="js/login.js"></script>
</head>

<body>
    <video id="loginAnimation" class="hidden">
        <source src="media/login/bloom.mp4" type="video/mp4">
    </video>
    <div id="authForms">
        <div class="user-icon">
            <img src="media/login/user-icon.webp" alt="Default User Icon">
        </div>
        <form action="desktop.html" method="post" id="loginForm">
            <input id="loginUsername" type="text" name="username" placeholder="Jméno" autocomplete="off"
                pattern="[a-zA-Z0-9]{5,16}" title="" required>
            <input id="loginPassword" type="password" name="password" placeholder="Heslo"
                autocomplete="current-password" pattern=".{6,}" required>
            <label class="loginButton">
                <input type="submit" value="Submit">
                <svg width="24" height="24" viewBox="0 0 24 24">
                    <path d="M4,11V13H16L10.5,18.5L11.92,19.92L19.84,12L11.92,4.08L10.5,5.5L16,11H4Z"></path>
                </svg>
            </label>
        </form>
        <form action="desktop.html" method="post" id="registerForm">
            <input id="registerUsername" type="text" name="username" placeholder="Jméno" autocomplete="off"
                pattern="[a-zA-Z0-9]{5,16}" title="Jméno musí mít 5-16 znaků, a smí být složeno pouze z a-z, A-Z, 0-9"
                required>
            <input id="registerPassword" type="password" name="password" placeholder="Heslo" autocomplete="off"
                pattern=".{6,}" title="Heslo musí obsahovat 6 a více znaků" required>
            <input id="registerPasswordAgain" type="password" name="passwordAgain" placeholder="Heslo znovu"
                autocomplete="off" pattern=".{6,}" required>
            <label class="loginButton">
                <input type="submit" value="Submit">
                <svg width="24" height="24" viewBox="0 0 24 24">
                    <path d="M4,11V13H16L10.5,18.5L11.92,19.92L19.84,12L11.92,4.08L10.5,5.5L16,11H4Z"></path>
                </svg>
            </label>
        </form>

        <label for="toggle-login-register">
            <input type="checkbox" id="toggle-login-register">
        </label>

    </div>
</body>

</html>
