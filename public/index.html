<!DOCTYPE html>
<html lang="en">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="css/login.css">
<link rel="prefetch" href="desktop.html">
<link rel="prefetch" href="css/main.css">
<!-- <link rel="stylesheet" type="text/css" href="css/main.css"> -->
<link rel="prefetch" href="js/classes.js">
<link rel="prefetch" href="js/main.js">
<link rel="prefetch" href="js/utils.js">
<link rel="prefetch" href="media/last.webp">
<link href="https://fonts.cdnfonts.com/css/segoe-ui-variable-static-display" rel="stylesheet">
<link rel="icon" href="media/favicon.png"
        type="image/gif" sizes="256x256">
<title>Login</title>
<script src="js/login.js"></script>
</head>

<body>
    <video id="loginAnimation" class="hidden">
        <source src="media/bloom.mp4" type="video/mp4">
    </video>
    <div id="authForm">
        <div class="user-icon">
            <img src="media/defaults/user-icon.webp" alt="Default User Icon">
        </div>
        <form action="desktop.html" method="post" onsubmit="login(event)">
            <input id="username" type="text" name="username" placeholder="Jméno" autocomplete="off">
            <input id="password" type="password" name="password" placeholder="Heslo" autocomplete="current-password">
            <label class="loginButton">
                <input type="submit" value="Submit">
                <svg width="24" height="24" viewBox="0 0 24 24">
                    <path d="M4,11V13H16L10.5,18.5L11.92,19.92L19.84,12L11.92,4.08L10.5,5.5L16,11H4Z"></path>
                </svg>
            </label>
        </form>
        <span id="toggle-login-register">abc</span>
    </div>
</body>

</html>
