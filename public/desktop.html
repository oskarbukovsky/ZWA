<!DOCTYPE html>
<html lang="cs">

<head>
    <title>Desktop</title>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="author" content="Jan Oskar Bukovský">
    <meta name="description" content="ZWA project">
    <meta name="Content-Type" content="text/html">

    <link rel="stylesheet" type="text/css" href="css/variables.css">
    <link rel="stylesheet" type="text/css" href="css/main.css">
    <link rel="stylesheet" type="text/css" href="css/desktop.css">
    <link rel="stylesheet" type="text/css" href="css/navbar.css">
    <link rel="stylesheet" type="text/css" href="css/windows.css">
    <link rel="stylesheet" type="text/css" href="css/media.css">
    <link href="https://fonts.cdnfonts.com/css/segoe-ui-variable-static-display" rel="stylesheet">
    <link rel="icon" href="media/favicon.png" type="image/png" sizes="256x256">

    <link rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,200,0,0">

    <script src="js/classes.js"></script>
    <script src="js/utils.js"></script>
    <script src="js/testData.js"></script>
    <script defer src="js/setup.js"></script>
    <script defer src="js/main.js"></script>
    <script defer src="js/events.js"></script>

    <noscript>
        <link rel="stylesheet" type="text/css" href="css/noscript.css">
    </noscript>
</head>

<body>
    <div id="desktop" class="working-area">
    </div>
    <div id="windows" class="working-area">
    </div>
    <div id="navbar" class="no-select">
        <div class="navbar-menu">
            <div class="navbar-button-content"></div>
            <div class="main-menu"></div>
        </div>
        <div class="navbar-search">
            <div class="navbar-button-content searchbar"></div>
            <div class="search-menu"></div>
        </div>
        <div class="navbar-spacer"></div>
        <div class="navbar-volume navbar-battery">
            <div class="navbar-button-content">
                <div class="volume">
                    <span class="material-symbols-rounded">
                        volume_up
                    </span>
                </div>
            </div>
        </div>
        <div class="navbar-time">
            <div class="navbar-button-content datetime">
                <span id="datetime"></span>
                <span id="notifications" class="material-symbols-rounded">
                    notifications
                </span>
            </div>
            <div class="calendar-container">
                <header class="calendar-header">
                    <p class="calendar-current-date"></p>
                    <div class="calendar-navigation">
                        <span id="calendar-prev" class="material-symbols-rounded">
                            arrow_drop_up
                        </span>
                        <span id="calendar-next" class="material-symbols-rounded">
                            arrow_drop_down
                        </span>
                    </div>
                </header>

                <div class="calendar-body">
                    <ul class="calendar-weekdays">
                        <li>po</li>
                        <li>út</li>
                        <li>st</li>
                        <li>čt</li>
                        <li>pá</li>
                        <li>so</li>
                        <li>ne</li>
                    </ul>
                    <ul class="calendar-dates"></ul>
                </div>
            </div>
        </div>
        <div class="navbar-minimize"></div>
    </div>
    <div class="errors hidden no-select">
    </div>
    <div class="uploading">
        <input type="file" id="fileUpload" name="fileUpload" class="hidden">
    </div>
</body>

</html>
